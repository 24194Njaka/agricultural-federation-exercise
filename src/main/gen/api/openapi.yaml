components:
  parameters:
    CollectiviteIdParam:
      description: Identifiant unique de la collectivité
      explode: false
      in: path
      name: collectiviteId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    MembreIdParam:
      description: Identifiant unique du membre
      explode: false
      in: path
      name: membreId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    CompteIdParam:
      description: Identifiant unique du compte
      explode: false
      in: path
      name: compteId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    ActiviteIdParam:
      description: Identifiant unique de l'activité
      explode: false
      in: path
      name: activiteId
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    PageParam:
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 0
        minimum: 0
        type: integer
      style: form
    SizeParam:
      explode: true
      in: query
      name: size
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Requête invalide
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Ressource introuvable
    UnprocessableEntity:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Conditions métier non satisfaites
  schemas:
    PosteEnum:
      enum:
      - PRESIDENT
      - PRESIDENT_ADJOINT
      - TRESORIER
      - SECRETAIRE
      - MEMBRE_CONFIRME
      - MEMBRE_JUNIOR
      type: string
    GenreEnum:
      enum:
      - FEMININ
      - MASCULIN
      type: string
    ModePaiementEnum:
      enum:
      - ESPECE
      - VIREMENT_BANCAIRE
      - MOBILE_MONEY
      type: string
    TypeCotisationEnum:
      enum:
      - MENSUELLE
      - ANNUELLE
      - PONCTUELLE
      type: string
    TypeCompteEnum:
      enum:
      - CAISSE
      - BANCAIRE
      - MOBILE_MONEY
      type: string
    TypeActiviteEnum:
      enum:
      - ASSEMBLEE_GENERALE_MENSUELLE
      - FORMATION_JUNIORS
      - EXCEPTIONNELLE
      type: string
    StatutPresenceEnum:
      enum:
      - PRESENT
      - ABSENT
      - EXCUSE
      type: string
    NomBanqueEnum:
      enum:
      - BRED
      - MCB
      - BMOI
      - BOA
      - BGFI
      - AFG
      - ACCES_BANQUE
      - BAOBAB
      - SIPEM
      type: string
    NomMobileMoneyEnum:
      enum:
      - ORANGE_MONEY
      - MVOLA
      - AIRTEL_MONEY
      type: string
    StatutCollectiviteEnum:
      enum:
      - EN_ATTENTE
      - AUTORISEE
      - REJETEE
      - ACTIVE
      - DISSOUTE
      type: string
    Collectivite:
      example:
        ville: ville
        dateCreation: 2000-01-23
        nombreMembres: 0
        specialiteAgricole: specialiteAgricole
        numero: numero
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        nom: nom
        statut: EN_ATTENTE
      properties:
        id:
          format: uuid
          type: string
        numero:
          description: Numéro unique de la collectivité
          type: string
        nom:
          description: Nom unique de la collectivité
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string
        dateCreation:
          format: date
          type: string
        statut:
          $ref: '#/components/schemas/StatutCollectiviteEnum'
        nombreMembres:
          type: integer
      required:
      - dateCreation
      - id
      - nom
      - numero
      - specialiteAgricole
      - statut
      - ville
    CollectivitePage:
      example:
        size: 5
        totalPages: 1
        page: 5
        content:
        - ville: ville
          dateCreation: 2000-01-23
          nombreMembres: 0
          specialiteAgricole: specialiteAgricole
          numero: numero
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          nom: nom
          statut: EN_ATTENTE
        - ville: ville
          dateCreation: 2000-01-23
          nombreMembres: 0
          specialiteAgricole: specialiteAgricole
          numero: numero
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          nom: nom
          statut: EN_ATTENTE
        totalElements: 6
      properties:
        content:
          items:
            $ref: '#/components/schemas/Collectivite'
          type: array
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer
    CollectiviteCreationRequest:
      example:
        postesOccupes:
          secretaireId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          presidentId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          tresorierID: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          presidentAdjointId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        ville: ville
        specialiteAgricole: specialiteAgricole
        membresInitiaux:
        - 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        - 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        nom: nom
      properties:
        nom:
          type: string
        ville:
