openapi: 3.1.3
info:
  contact:
    name: Fédération de Collectivités Agricoles
  description: |
    API REST pour la gestion de la Fédération de Collectivités Agricoles de Madagascar.
    Cette API couvre la gestion des collectivités, des membres, des cotisations,
    de la trésorerie, des activités, de l'assiduité et des statistiques.
  title: API - Fédération de Collectivités Agricoles
  version: 2.0.0
servers:
- description: Serveur de production
  url: http://localhost:8080
tags:
- description: Gestion des collectivités agricoles (Section A)
  name: Collectivités
- description: Admission et gestion des membres (Section B)
  name: Membres
- description: Gestion des cotisations et paiements (Section C)
  name: Cotisations
- description: Gestion des comptes et de la situation financière (Section D)
  name: Trésorerie
- description: Gestion des activités des collectivités et de la fédération (Section
    E)
  name: Activités
- description: Gestion de la présence aux activités (Section F)
  name: Assiduité
- description: Statistiques internes des collectivités (Section G)
  name: Statistiques Collectivités
- description: Statistiques globales de la fédération (Section H)
  name: Statistiques Fédération
paths:
  /collectivites:
    get:
      operationId: listCollectivites
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - description: Filtrer par ville
        explode: true
        in: query
        name: ville
        required: false
        schema:
          type: string
        style: form
      - description: Filtrer par spécialité agricole
        explode: true
        in: query
        name: specialite
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivitePage'
          description: Liste des collectivités
      summary: Lister toutes les collectivités
      tags:
      - Collectivités
      x-accepts:
      - application/json
    post:
      description: |
        Soumet une demande d'ouverture. Conditions requises :
        - Au moins 10 membres dont 5 avec plus de 6 mois d'ancienneté dans la fédération
        - Postes spécifiques (président, président adjoint, trésorier, secrétaire) pourvus
        - Autorisation formelle de la fédération
        - Ville et spécialité agricole définies
      operationId: createCollectivite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreationRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Collectivité créée avec succès
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Demander l'ouverture d'une nouvelle collectivité
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}:
    get:
      operationId: getCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Détails de la collectivité
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir les détails d'une collectivité
      tags:
      - Collectivités
      x-accepts:
      - application/json
    put:
      operationId: updateCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Collectivité mise à jour
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Mettre à jour une collectivité
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/autorisation:
    post:
      description: Endpoint réservé à la fédération pour valider ou rejeter une demande
        d'ouverture.
      operationId: decideAutorisationCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorisationDecision'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Décision enregistrée
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Accorder ou refuser l'autorisation d'ouverture d'une collectivité
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres:
    get:
      operationId: listMembresCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - description: Filtrer par poste
        explode: true
        in: query
        name: poste
        required: false
        schema:
          $ref: '#/components/schemas/PosteEnum'
        style: form
      - description: Filtrer les membres actifs (non démissionnaires)
        explode: true
        in: query
        name: actif
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembrePage'
          description: Liste des membres
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les membres d'une collectivité
      tags:
      - Membres
      x-accepts:
      - application/json
    post:
      description: |
        Conditions d'admission (B-2 mis à jour) :
        - Être parrainé par au moins 2 membres confirmés ; le nombre de parrains
          issus de la collectivité cible doit être ≥ nombre de parrains issus d'autres collectivités.
        - Fournir ses informations personnelles (dont la relation avec chaque parrain).
        - Régler les frais d'adhésion (50 000 MGA) + cotisations annuelles obligatoires
          imposées par la collectivité.
      operationId: admettreMembreCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionMembreRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Membre admis avec succès
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Admettre un nouveau membre dans une collectivité
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}:
    get:
      operationId: getMembreCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/MembreIdParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Détails du membre
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir les détails d'un membre dans une collectivité
      tags:
      - Membres
      x-accepts:
      - application/json
    put:
      operationId: updateMembreCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/MembreIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreUpdateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Membre mis à jour
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Mettre à jour les informations d'un membre
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    post:
      operationId: transfererMembre
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/MembreIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransfertMembreRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Transfert effectué
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Transférer un membre vers une autre collectivité
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    post:
      operationId: demissionMembre
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/MembreIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemissionRequest'
        required: true
      responses:
        "200":
          description: Démission enregistrée
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Enregistrer la démission d'un membre
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/mandats:
    get:
      operationId: listMandats
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - description: Filtrer par année civile
        explode: true
        in: query
        name: annee
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Mandat'
                type: array
          description: Liste des mandats
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les mandats d'une collectivité
      tags:
      - Membres
      x-accepts:
      - application/json
    post:
      operationId: createMandat
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
          description: Mandat créé
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Enregistrer un nouveau mandat (résultat de vote)
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/cotisations:
    get:
      operationId: listCotisations
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: '#/components/schemas/TypeCotisationEnum'
        style: form
      - explode: true
        in: query
        name: dateDebut
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: dateFin
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotisationPage'
          description: Liste des cotisations
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les cotisations d'une collectivité
      tags:
      - Cotisations
      x-accepts:
      - application/json
    post:
      operationId: createCotisation
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
          description: Cotisation créée
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Créer une cotisation (périodique ou ponctuelle)
      tags:
      - Cotisations
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/paiements:
    get:
      operationId: listPaiements
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - explode: true
        in: query
        name: membreId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: dateDebut
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: dateFin
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: modePaiement
        required: false
        schema:
          $ref: '#/components/schemas/ModePaiementEnum'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaiementPage'
          description: Liste des encaissements
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les encaissements d'une collectivité
      tags:
      - Cotisations
      x-accepts:
      - application/json
    post:
      description: "Le trésorier enregistre le montant, la date et le mode de paiement."
      operationId: createPaiement
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaiementRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paiement'
          description: Encaissement enregistré
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Enregistrer un encaissement (paiement d'un membre)
      tags:
      - Cotisations
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/comptes:
    get:
      operationId: listComptesCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: '#/components/schemas/TypeCompteEnum'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Compte'
                type: array
          description: Liste des comptes
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les comptes d'une collectivité
      tags:
      - Trésorerie
      x-accepts:
      - application/json
    post:
      description: |
        Une collectivité ne peut avoir qu'une seule caisse.
        Elle peut avoir plusieurs comptes bancaires ou mobile money.
      operationId: createCompteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Compte créé
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflit - une caisse existe déjà
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
      summary: Ajouter un compte à une collectivité
      tags:
      - Trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/comptes/{compteId}:
    get:
      operationId: getCompteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/CompteIdParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Détails du compte
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir les détails d'un compte
      tags:
      - Trésorerie
      x-accepts:
      - application/json
    put:
      operationId: updateCompteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/CompteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Compte mis à jour
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Mettre à jour un compte
      tags:
      - Trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/comptes/{compteId}/solde:
    get:
      operationId: getSoldeCompte
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/CompteIdParam'
      - description: Date à laquelle consulter le solde (défaut = aujourd'hui)
        explode: true
        in: query
        name: date
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeResponse'
          description: Solde du compte
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir le solde d'un compte à une date donnée
      tags:
      - Trésorerie
      x-accepts:
      - application/json
  /federation/comptes:
    get:
      operationId: listCompteFederation
      parameters:
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: '#/components/schemas/TypeCompteEnum'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Compte'
                type: array
          description: Liste des comptes de la fédération
      summary: Lister les comptes de la fédération
      tags:
      - Trésorerie
      x-accepts:
      - application/json
    post:
      operationId: createCompteFederation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Compte créé
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Une caisse existe déjà pour la fédération
      summary: Ajouter un compte à la fédération
      tags:
      - Trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /federation/comptes/{compteId}/solde:
    get:
      operationId: getSoldeCompteFederation
      parameters:
      - $ref: '#/components/parameters/CompteIdParam'
      - explode: true
        in: query
        name: date
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeResponse'
          description: Solde du compte
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir le solde d'un compte de la fédération
      tags:
      - Trésorerie
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/activites:
    get:
      operationId: listActivitesCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - explode: true
        in: query
        name: type
        required: false
        schema:
          $ref: '#/components/schemas/TypeActiviteEnum'
        style: form
      - explode: true
        in: query
        name: dateDebut
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: dateFin
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivitePage'
          description: Liste des activités
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Lister les activités d'une collectivité
      tags:
      - Activités
      x-accepts:
      - application/json
    post:
      description: |
        Types d'activités :
        - ASSEMBLEE_GENERALE_MENSUELLE (obligatoire, date fixée annuellement)
        - FORMATION_JUNIORS (obligatoire pour les juniors, date fixée annuellement)
        - EXCEPTIONNELLE (présence définie par la collectivité)
      operationId: createActiviteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
          description: Activité créée
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Créer une activité pour une collectivité
      tags:
      - Activités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/activites/{activiteId}:
    get:
      operationId: getActiviteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/ActiviteIdParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
          description: Détails de l'activité
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Obtenir les détails d'une activité
      tags:
      - Activités
      x-accepts:
      - application/json
    put:
      operationId: updateActiviteCollectivite
      parameters:
      - $ref: '#/components/parameters/CollectiviteIdParam'
      - $ref: '#/components/parameters/ActiviteIdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
          description: Activité mise à jour
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Mettre à jour une activité
      tags:
      - Activités
      x-content-type: application/json
      x-accepts:
      - application/json
  /federation/activites:
    get:
      operationId: listActivitesFederation
