          type: string
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          format: date
          type: string
        genre:
          $ref: '#/components/schemas/GenreEnum'
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          format: email
          type: string
        dateAdhesion:
          format: date
          type: string
        collectiviteId:
          format: uuid
          type: string
        posteActuel:
