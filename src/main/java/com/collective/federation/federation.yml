openapi: 3.1.3
info:
  title: API Fédération de Collectivités Agricoles
  description: |
    Spécification OpenAPI pour la digitalisation des processus administratifs 
    de la Fédération de Collectivités Agricoles à Madagascar.
    Couvre les fonctionnalités A à G du cahier des charges.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Serveur local

paths:

  # ====================== A - Ouverture d’une nouvelle collectivité ======================
  /collectivites:
    post:
      tags: [Collectivités]
      summary: Créer une nouvelle collectivité (Fonctionnalité A)
      description: Vérifie automatiquement les conditions (≥10 membres avec 6 mois d’ancienneté, postes occupés, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        '201':
          description: Collectivité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          description: Conditions d’ouverture non remplies
          content:
            text/plain:
              schema:
                type: string
                example: "Nombre de membres insuffisant ou postes spécifiques non occupés"

  # ====================== B - Admission d’un nouveau membre ======================
  /collectivites/{collectiviteId}/membres:
    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité (Fonctionnalité B)
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmission'
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          description: Conditions non remplies (parrainage, frais, etc.)
          content:
            text/plain:
              schema:
                type: string
                example: "Parrain non valide ou frais d’adhésion non réglés"

  # ====================== C - Cotisation et paiements ======================
  /encaissements:
    post:
      tags: [Trésorerie]
      summary: Enregistrer un encaissement / cotisation (Fonctionnalité C)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Encaissement'
      responses:
        '201':
          description: Encaissement enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encaissement'

  # ====================== D - Situation de trésorerie ======================
  /collectivites/{collectiviteId}/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister tous les comptes d’une collectivité (Fonctionnalité D)
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste des comptes et soldes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /comptes/{compteId}/solde:
    get:
      tags: [Trésorerie]
      summary: Consulter le solde d’un compte à une date donnée (Fonctionnalité D)
      parameters:
        - name: compteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Solde du compte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solde'

  # ====================== E - Activités ======================
  /collectivites/{collectiviteId}/activites:
    get:
      tags: [Activités]
      summary: Lister les activités d’une collectivité (Fonctionnalité E)
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'

  /activites:
    post:
      tags: [Activités]
      summary: Créer une activité (obligatoire ou exceptionnelle) – Collectivité ou Fédération (Fonctionnalité E)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreation'
      responses:
        '201':
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'

  # ====================== F - Assiduité des membres ======================
  /activites/{activiteId}/presences:
    post:
      tags: [Assiduite]
      summary: Enregistrer les présences pour une activité (Fonctionnalité F)
      parameters:
        - name: activiteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Presence'
      responses:
        '201':
          description: Présences enregistrées

  /membres/{membreId}/assiduite:
    get:
      tags: [Assiduite]
      summary: Taux d’assiduité d’un membre sur une période (Fonctionnalité F)
      parameters:
        - name: membreId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: du
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: au
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Taux d’assiduité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TauxAssiduite'

  # ====================== G - Statistiques d’une collectivité ======================
  /collectivites/{collectiviteId}/statistiques:
    get:
      tags: [Statistiques]
      summary: Rapport mensuel complet (Fonctionnalité G)
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: mois
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-04"
      responses:
        '200':
          description: Statistiques globales et par membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesCollectivite'

# ====================== SCHÉMAS (components) ======================
components:
  schemas:

    Collectivite:
      type: object
      properties:
        id:
          type: integer
          format: int64
        numeroUnique:
          type: string
        nomUnique:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string
        dateCreation:
          type: string
          format: date

    CollectiviteCreation:
      type: object
      required: [nomUnique, ville, specialiteAgricole]
      properties:
        nomUnique:
          type: string
        ville:
          type: string
        specialiteAgricole:
          type: string
        membres:
          type: array
          items:
            $ref: '#/components/schemas/MembreAdmission'

    Membre:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nom:
          type: string
        prenoms:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          type: string
          enum: [MASCULIN, FEMININ]
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
        dateAdhesion:
          type: string
          format: date
        poste:
          type: string
          enum: [PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE, MEMBRE_CONFIRME, MEMBRE_JUNIOR]

    MembreAdmission:
      type: object
      required: [nom, prenoms, dateNaissance, genre, adresse, metier, telephone, email, parrainId]
      properties:
        nom:
          type: string
        prenoms:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          type: string
          enum: [MASCULIN, FEMININ]
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
        parrainId:
          type: integer
          format: int64

    Encaissement:
      type: object
      required: [membreId, collectiviteId, montant, dateEncaissement, modePaiement]
      properties:
        id:
          type: integer
          format: int64
        membreId:
          type: integer
          format: int64
        collectiviteId:
          type: integer
          format: int64
        montant:
          type: number
          format: decimal
        dateEncaissement:
          type: string
          format: date-time
        modePaiement:
          type: string
          enum: [ESPECES, VIREMENT_BANCAIRE, MOBILE_MONEY]
        type:
          type: string
          enum: [PERIODIQUE, PONCTUELLE]

    Compte:
      type: object
      properties:
        id:
          type: integer
          format: int64
        collectiviteId:
          type: integer
          format: int64
        type:
          type: string
          enum: [CAISSE, BANCAIRE, MOBILE_MONEY]
        solde:
          type: number
          format: decimal
        devise:
          type: string
          default: MGA

    Solde:
      type: object
      properties:
        compteId:
          type: integer
          format: int64
        solde:
          type: number
          format: decimal
        date:
          type: string
          format: date
        devise:
          type: string
          default: MGA

    Activite:
      type: object
      properties:
        id:
          type: integer
          format: int64
        collectiviteId:
          type: integer
          format: int64
        type:
          type: string
          enum: [ASSEMBLEE_GENERALE_MENSUELLE, FORMATION_JUNIOR, EXCEPTIONNELLE, AG_ANNUELLE]
        date:
          type: string
          format: date-time
        obligatoire:
          type: boolean
        cible:
          type: string
          enum: [TOUS, JUNIORS]

    ActiviteCreation:
      type: object
      required: [type, date, obligatoire]
      properties:
        type:
          type: string
          enum: [ASSEMBLEE_GENERALE_MENSUELLE, FORMATION_JUNIOR, EXCEPTIONNELLE, AG_ANNUELLE]
        date:
          type: string
          format: date-time
        obligatoire:
          type: boolean
        cible:
          type: string
          enum: [TOUS, JUNIORS]
        collectiviteId:
          type: integer
          format: int64

    Presence:
      type: object
      required: [membreId, present]
      properties:
        membreId:
          type: integer
          format: int64
        present:
          type: boolean
        motifAbsence:
          type: string

    TauxAssiduite:
      type: object
      properties:
        membreId:
          type: integer
          format: int64
        periodeDu:
          type: string
          format: date
        periodeAu:
          type: string
          format: date
        taux:
          type: number
          format: float
          example: 92.5

    StatistiquesCollectivite:
      type: object
      properties:
        collectiviteId:
          type: integer
          format: int64
        mois:
          type: string
          format: date
        nombreMembresActifs:
          type: integer
        tauxAssiduiteGlobale:
          type: number
          format: float
        statistiquesParMembre:
          type: array
          items:
            $ref: '#/components/schemas/StatistiqueMembre'

    StatistiqueMembre:
      type: object
      properties:
        membreId:
          type: integer
          format: int64
        tauxAssiduite:
          type: number
          format: float
        montantEncaisse:
          type: number
          format: decimal
        montantImpaye:
          type: number
          format: decimal