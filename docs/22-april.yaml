openapi: 3.0.3
info:
  title: Federation Collective API
  version: 0.0.3

paths:
  /collectivities/{id}/federation-assignment:
    patch:
      summary: Assign federation number and unique name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederationAssignment'
      responses:
        200:
          description: Updated collectivity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        400:
          description: Invalid request
        404:
          description: Collectivity not found
        409:
          description: Already assigned (immutable)

components:
  schemas:
    FederationAssignment:
      type: object
      required:
        - federationNumber
        - uniqueName
      properties:
        federationNumber:
          type: string
        uniqueName:
          type: string

    Collectivity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        federationNumber:
          type: string
          nullable: true
        uniqueName:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]